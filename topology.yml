name: mini-web-ctf

hosts:
  - name: attacker
    base_box:
      image: debian-11
      mgmt_user: debian
    flavor: csirtmu.tiny1x2
  - name: target
    base_box:
      image: debian-11
      mgmt_user: debian
    flavor: csirtmu.tiny1x2

routers:
  - name: edge-router
    base_box:
      image: debian-11
      mgmt_user: debian
    flavor: csirtmu.tiny1x2

networks:
  - name: attacker-net
    cidr: 10.10.10.0/24
  - name: target-net
    cidr: 10.20.20.0/24

net_mappings:
  - host: attacker
    network: attacker-net
    ip: 10.10.10.10
  - host: target
    network: target-net
    ip: 10.20.20.20

router_mappings:
  - router: edge-router
    network: attacker-net
    ip: 10.10.10.1
  - router: edge-router
    network: target-net
    ip: 10.20.20.1